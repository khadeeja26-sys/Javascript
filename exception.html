<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        try{
            let num=10/0;
            document.getElementById("demo").innerHTML=num;
        }
        catch(err)
        {
            document.getElementById("demo").innerHTML="Err"+err.message;
        }
        finally{
            console.log("This block always runs!");
        }
    </script>
</body>
</html>
