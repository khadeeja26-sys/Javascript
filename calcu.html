<p id="display">0</p>

<div class="container">
    <div class="box1" onclick="clr()">C</div>
    <div class="box2" onclick="appendValue('/')">/</div>
    <div class="box3" onclick="appendValue('*')">*</div>
    <div class="box4" onclick="backspace()">←</div>
</div>
<div class="container2">
    <div class="box5" onclick="appendValue('7')">7</div>
    <div class="box6" onclick="appendValue('8')">8</div>
    <div class="box7" onclick="appendValue('9')">9</div>
    <div class="box8" onclick="appendValue('-')">-</div>
</div>
<div class="container3">
    <div class="box9" onclick="appendValue('4')">4</div>
    <div class="box10" onclick="appendValue('5')">5</div>
    <div class="box11" onclick="appendValue('6')">6</div>
    <div class="box12" onclick="appendValue('+')">+</div>
</div>
<div class="container4">
    <div class="box13" onclick="appendValue('1')">1</div>
    <div class="box14" onclick="appendValue('2')">2</div>
    <div class="box15" onclick="appendValue('3')">3</div>
    <div class="box16" onclick="solve()">=</div>
</div>
<div class="container5">
    <div class="box17" onclick="appendValue('0')">0</div>
    <div class="box18" onclick="appendValue('.')">.</div>
</div>

<script>
function appendValue(num) {
    let displayElem = document.getElementById("display");
    if(displayElem.innerHTML === '0') displayElem.innerHTML = num;
    else displayElem.innerHTML += num;
}

function clr() {
    document.getElementById("display").innerHTML = '0';
}

function solve() {
    let displayElem = document.getElementById("display");
    try {
        displayElem.innerHTML = eval(displayElem.innerHTML);
    } catch {
        displayElem.innerHTML = "Error";
    }
}

function backspace() {
    let displayElem = document.getElementById("display");
    let val = displayElem.innerHTML;
    val = val.slice(0, -1);
    if(val === '') val = '0';
    displayElem.innerHTML = val;
}
</script>
