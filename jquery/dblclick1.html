<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
           <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
           <script>
            $(document).ready(function(){
                $("button").dblclick(function(){
$(".test").hide();
                });
            });
           </script>
</head>
<body>
    <p class="test">This is an paragraph with ID "test"</p>
    <p class="test">This is an another paragraph with ID "test"</p>
    <p>This is an paragraph with no class</p>
    <button>Hide</button>
    
</body>
</html>
