<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
    <button>Animate</button>
    <div style="width:100px;height:100px;background-color: black;position:relative"></div>
    <script>
    $("button").click(function(){
        $("div").animate({left:'125px',opacity:'0.5',width:'150px',height:'150px'});
    });
    </script>
</body>
</html>
