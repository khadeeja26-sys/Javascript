<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
       <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
       <style>
        #flip,#panel{
            padding:10px;
            background-color: blue;
            border:1px solid yellow;
            text-align: center;

        }
        #panel{
            
            padding:50px;
        }

       </style>
       <script>
        $(document).ready(function(){
            $("#flip").click(function(){
                $("#panel").slideUp("slow");
            });
        });
       </script>
</head>
<body>
    <div id="flip">Click to slide slideUp</div>
    <div id="panel">I want to slide up</div>
</body>
</html>
