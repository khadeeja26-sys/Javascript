<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
 <button id="flip">Start Slide</button>  
 <button id="stop">Stop Slide</button>  
 <div id="panel" style="height:100px;width:200px;background:red;display:none"></div>
 <script>
    $("#flip").click(function(){
        $("#panel").slideDown(5000);
    });
    $("#stop").click(function(){
        $("#panel").stop();
    });
 </script>
</body>
</html>
