<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
        $(document).ready(function()
    {
        $("#btn1").click(function(){
            $("#div1").fadeIn();
            $("#div2").fadeIn("slow");
            $("#div3").fadeIn(3000);
        });
        $("#btn2").click(function(){
            $("#div1").fadeOut();
            $("#div2").fadeOut("slow");
            $("#div3").fadeOut(3000);
        });
        $("#toggle").click(function(){
            $("#div4").fadeToggle();
        });
        $("#fadeTo").click(function(){
            $("#div5").fadeTo("slow",0.3);
        });

    });
    </script>
</head>
<body>
    <button id="btn1">click to fade In</button>
    <button id="btn2">click to fade out</button>
    <button id="toggle">Toggle </button>
    <button id="fadeTo">click to fade To</button>
    <div id="div1" style="width:80px;height:80px;display:none;background:red;"></div>
    <div id="div2" style="width:80px;height:80px;display:none;background:green;"></div>
    <div id="div3" style="width:80px;height:80px;display:none;background:blue;"></div>
    <div id="div4" style="width:80px;height:80px;display:none;background:yellow"></div>
    <div id="div5" style="width:80px;height:80px;display:none;background:purple"></div>
    
</body>
</html>
