<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function divide(a,b)
        {
            try{
                if(b==0)
            {
                throw "Divide by zero error";
            }else{
                alert("result:"+(a/b));
            }
            }
            catch(err)
            {
                alert("Error:"+err);
            }
        }
        divide(100,0);
    </script>
</body>
</html>
