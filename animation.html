<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #animate{
        width:50px;
        height:50px;
        background-color: red;
        position: absolute;
    }
</style>
<body>
    <p><button onclick="moveBox()">Start Animation</button></p>
    <div id="animate"></div>
    <script>
        function moveBox(){
            let elem=document.getElementById("animate");
            let pos=0;
            let id=setInterval(frame,10);
            function frame(){
                if(pos>=350){
                    clearInterval(id);
                }else{
                    pos++;
                    elem.style.left=pos+"px";
                
                }
            }
        }
    </script>
</body>
</html>
