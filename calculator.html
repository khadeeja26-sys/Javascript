<body>
    
    <div class="container1" >
<p id="display" style="color:white;text-align: right;padding-top:20px;">0</p>
    </div>
    <div class="container">
<div  class="box1" onclick="clr()">C</div>
<div class="box2" onclick="display('/')">/</div>
<div class="box3" onclick="display('*')">*</div>
<div class="box4" onclick="backspace()" >←</div></div>
<div class="container2"><div class="box5" onclick="display('7')">7</div>
<div class="box6" onclick="display('8')">8</div>
<div class="box7" onclick="display('9')">9</div>

</div>

<div class="box14" onclick="display('2')">2</div>
<div class="box15" onclick="display('3')">3</div>
<div class="box16" onclick="solve()">=</div>
</div>
<div class="container5">
<div class="box17" onclick="display('0')">0</div>
<div class="box18" onclick="display('.')">.</div></div>



<script>
function display(num){    let displayElem = document.getElementById("display");
    if(displayElem.innerHTML === '0') displayElem.innerHTML = num;
    else displayElem.innerHTML += num;
    

}
function clr()
{
    document.getElementById("display").innerHTML='0';
}
function solve()

    {
    let displayElem = document.getElementById("display");
    try {
        displayElem.innerHTML = eval(displayElem.innerHTML);
    } catch {
        displayElem.innerHTML = "Error";
    }
}


function backspace() {
    let displayElem = document.getElementById("display");
    let val = displayElem.innerHTML;
    val = val.slice(0, -1);
    if(val === '') val = '0';
    displayElem.innerHTML = val;
}
</script>
